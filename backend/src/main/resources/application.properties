server.port=8080

spring.application.name=satya-certificate-system

# =========================
# POSTGRESQL DATABASE (LOCAL)
# =========================

spring.datasource.url=jdbc:postgresql://localhost:5432/certificate_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# FRONTEND URL
# =========================

app.frontend-url=http://localhost:5173

# =========================
# ADMIN
# =========================

app.admin-email=electricalstudyworld@gmail.com
app.admin-default-password=admin12345

# =========================
# JWT
# =========================

app.jwt-secret=change_this_secret_key_change_this_secret_key_1234567890
app.jwt-expiration-ms=86400000

# =========================
# MAIL
# =========================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# OAUTH2 LOGIN
# =========================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email


spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email